name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout kshana-desktop
        uses: actions/checkout@v4

      - name: Checkout kshana-ink
        uses: actions/checkout@v4
        with:
          repository: anveshane/kshana-ink
          path: kshana-ink
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build kshana-ink
        working-directory: kshana-ink
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        env:
          KSHANA_CLOUD_SERVER_URL: ${{ secrets.KSHANA_SERVER_URL }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const url = process.env.KSHANA_CLOUD_SERVER_URL;
          if (!url) throw new Error('KSHANA_SERVER_URL is missing');
          fs.writeFileSync(
            'assets/runtime-config.json',
            JSON.stringify({ cloudServerUrl: url }, null, 2),
          );
          console.log('Wrote assets/runtime-config.json');
          EOF

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KSHANA_INK_PATH: ${{ github.workspace }}/kshana-ink
        run: npm run release

  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout kshana-desktop
        uses: actions/checkout@v4

      - name: Checkout kshana-ink
        uses: actions/checkout@v4
        with:
          repository: anveshane/kshana-ink
          path: kshana-ink
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build kshana-ink
        working-directory: kshana-ink
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        run: |
          $url = "${{ secrets.KSHANA_SERVER_URL }}"
          if (-not $url) { throw "KSHANA_SERVER_URL is missing" }
          $json = @{ cloudServerUrl = $url } | ConvertTo-Json
          Set-Content -Path "assets/runtime-config.json" -Value $json -Encoding UTF8
          Write-Host "Wrote assets/runtime-config.json"

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KSHANA_INK_PATH: ${{ github.workspace }}\kshana-ink
        run: npm run release
